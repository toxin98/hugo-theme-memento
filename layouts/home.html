{{ define "main" }}

  <div class="wrapper">

    <aside class="sidebar-left">
    </aside>

    <div class="middle-container">

      <div class="profile">

        <img class="avatar" src="{{ .Site.Params.profile.avatar }}" alt="avatar">

        <span>{{ .Site.Params.profile.name }}</span>

        <ul class="social">
          {{ range site.Params.social }}
            <li>
              <a href="{{ .url }}" target="_blank" aria-label="{{ .name }}" title="{{ .name }}">{{ partial "utils/icon.html" .icon }}</a>
            </li>
          {{ end }}
        </ul>
      </div>

    </div>

    <aside class="sidebar-right">
    </aside>

  </div>

{{ end }}
